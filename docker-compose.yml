version: '3.8'

services:

  # Notre API REST PlantUML
  plantuml-api:
    build: .
    container_name: plantuml-validator-api
    ports:
      - "8080:8080"
    networks:
      - monitoring

  # Prometheus - collecte les métriques
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring

  # Grafana - tableau de bord visuel
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge