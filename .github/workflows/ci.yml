name: Java CI avec Maven

# Quand le pipeline doit s’exécuter
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Télécharger le code
    - name: Télécharger le code
      uses: actions/checkout@v3

    # 2️⃣ Installer Java
    - name: Installer Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3️⃣ Compiler et exécuter les tests
    - name: Compiler le projet et lancer les tests
      run: mvn clean verify

    # 4️⃣ Vérifier la qualité du code avec Checkstyle
    - name: Vérifier la qualité du code (Checkstyle)
      run: mvn checkstyle:check
