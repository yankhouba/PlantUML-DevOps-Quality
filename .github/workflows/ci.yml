name: Java CI avec Maven

# Pipeline déclenché sur main ET develop ET les Pull Requests
# Avant : seulement sur main
# Après : sur main, develop, et toutes les Pull Requests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 - Télécharger le code
      - name: Telecharger le code
        uses: actions/checkout@v4

      # Étape 2 - Installer Java 17
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Étape 3 - Compiler et lancer les tests
      - name: Compiler et lancer les tests
        run: mvn clean verify

      # Étape 4 - Vérifier le style du code
      - name: Verifier la qualite du code Checkstyle
        run: mvn checkstyle:check

      # Étape 5 - Sauvegarder les rapports de tests
      - name: Sauvegarder les rapports de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/